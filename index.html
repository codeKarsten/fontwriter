<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FontWriter</title>
	<link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>
	<div class="app-shell">
		<div class="panel controls-panel">
			<label for="textInput">Text Input:</label><br>
			<textarea id="textInput" rows="10"
				cols="120">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.
Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.
Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</textarea><br><br>

			<div class="inline-options">
				<label class="inline-choice" for="radioDefault">
					<input type="radio" id="radioDefault" name="spriteSource" checked>
					<span>Default</span>
				</label>
				<label class="inline-choice" for="radioCustom">
					<input type="radio" id="radioCustom" name="spriteSource">
					<span>Custom Image</span>
				</label>
			</div>

			<fieldset id="customImage" style="display:none;">
				<label for="imageInput">Select Input Image:</label><br>
				<input type="file" id="imageInput" accept="image/*"><br><br>
				<img id="inputImage" src="all_letters.png" alt="Input Image" style="display:block;"><br><br>
				<label for="letterInput">Letters:</label><br>
				<input type="text" id="letterInput"
					value="ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜabcdefghijklmnopqrstuvwxyzäöü0123456789.,-„“!?"><br><br>
			</fieldset>

			<div class="settings-grid">
				<label class="setting-field" for="fontSize">
					<span>Font Size</span>
					<input type="range" id="fontSize" min="0.5" max="4" step="0.1" value="1">
					<output id="fontSizeValue" for="fontSize">1.0x</output>
				</label>
				<label class="setting-field" for="lineSpacing">
					<span>Line Spacing</span>
					<input type="range" id="lineSpacing" min="0" max="80" step="1" value="0">
					<output id="lineSpacingValue" for="lineSpacing">0 px</output>
				</label>
				<label class="setting-field" for="characterSpacing">
					<span>Character Spacing</span>
					<input type="range" id="characterSpacing" min="-10" max="80" step="1" value="0">
					<output id="characterSpacingValue" for="characterSpacing">0 px</output>
				</label>
				<label class="setting-field" for="maxWidth">
					<span>Max Width</span>
					<input type="range" id="maxWidth" min="0" max="2000" step="1" value="0">
					<output id="maxWidthValue" for="maxWidth">Unlimited</output>
				</label>
			</div>

			<div class="inline-options background-row">
				<label class="inline-choice" for="customBackgroundToggle">
					<input type="checkbox" id="customBackgroundToggle">
					<span>Custom Background</span>
				</label>
				<input type="color" id="customBackground" value="#ff00ff">
			</div>

			<div class="button-row">
				<button id="generateButton" type="button">Generate Image</button>
				<button id="exportPngButton" type="button">Export PNG</button>
				<button id="exportWebpButton" type="button">Export WEBP</button>
			</div>

			<p id="statusMessage" class="status-message"></p>
		</div>

		<div class="panel preview-panel">
			<div class="preview-header">
				<h1>Preview</h1>
				<p>Live preview updates as you type and adjust settings.</p>
			</div>
			<div class="canvas-frame">
				<canvas id="outputCanvas"></canvas>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
</body>

</html>
